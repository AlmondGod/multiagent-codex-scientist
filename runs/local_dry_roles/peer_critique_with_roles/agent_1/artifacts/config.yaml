base_system:
  repo_url: https://github.com/SakanaAI/AI-Scientist-v2
  use_existing_tree_search: true
  use_existing_reviewer: true
  write_full_paper: false
model:
  backend: openai_compatible
  model_url: http://localhost:1234/v1
  default_model: qwen3-coder-30b-a3b-instruct
  fallback_models:
  - qwen2.5-coder-14b
  - qwen2.5-coder-7b
  temperature: 0.2
  seed: 0
  max_prompt_tokens: 6000
  max_completion_tokens: 1000
compute:
  reduced_mode: true
  num_agents: 3
  max_depth_per_agent: 2
  max_experiments_per_agent: 2
  max_total_experiments: 6
  max_training_steps: 1000
  max_runtime_minutes_per_experiment: 20
  max_tokens_per_critique: 1000
experiment:
  substrate: TinyWorlds
  conditions:
  - self_critique
  - peer_critique
  - peer_critique_with_roles
  task_spec: Improve TinyWorlds world-model quality under a fixed small compute budget.
  train_command: null
  eval_command: null
  dataset_config_path: null
  allowed_files: []
  forbidden_files: []
  metric_json_paths: {}
  metric_regexes: {}
  primary_metric: primary_score
paths:
  tinyworlds_dir: /Users/almondgod/Repositories/tinyworlds
  ai_scientist_v2_dir: /Users/almondgod/Repositories/AI-Scientist-v2
  output_dir: runs/local_dry_roles
